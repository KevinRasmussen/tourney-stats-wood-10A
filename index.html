<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Pitch Tracker</title>
    <style>
        :root {
            --primary: #0f172a; --bg: #f1f5f9; --card-bg: #ffffff;
            --text: #0f172a; --border: #cbd5e1;
            --rag-green: #16a34a; --rag-yellow: #ca8a04;
            --rag-orange: #ea580c; --rag-red: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; max-width: 1100px; margin: 0 auto; }
        
        /* LOCK SCREEN STYLING */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000; transition: opacity 0.5s;
        }

        header { background: var(--primary); color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 900px) { .layout { grid-template-columns: 380px 1fr; } }
        .card { background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px; padding: 20px; }
        .limit-config-header { background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        input, select, button { border-radius: 6px; border: 1px solid var(--border); font-size: 1rem; width: 100%; margin-bottom: 10px; padding: 12px; }
        .counter-input { width: 100%; font-size: 5rem; font-weight: 900; text-align: center; border: none; background: transparent; }
        .status-pill { font-size: 0.8rem; font-weight: bold; padding: 5px 12px; border-radius: 20px; color: white; }
        .player-row { border-bottom: 1px solid var(--border); padding: 12px 0; }
        .player-header { display: flex; justify-content: space-between; cursor: pointer; }
        .stint-list { margin-top: 10px; background: #f1f5f9; display: none; padding: 10px; border-radius: 8px; }
        .stint-list.open { display: block; }
        .rag-green { background: var(--rag-green); } .rag-yellow { background: var(--rag-yellow); }
        .rag-orange { background: var(--rag-orange); } .rag-red { background: var(--rag-red); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .hidden { display: none !important; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 🟢 PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCHoF69fKGGwbMKLBk10CQkT_26VwjOb2E",
            authDomain: "tournamentpitchtracker.firebaseapp.com",
            databaseURL: "https://tournamentpitchtracker-default-rtdb.firebaseio.com",
            projectId: "tournamentpitchtracker",
            storageBucket: "tournamentpitchtracker.firebasestorage.app",
            messagingSenderId: "811876287070",
            appId: "1:811876287070:web:610c53801c3a436e99eacf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let appState = { roster: [], liveCount: 0, activePitcherId: "", tournamentRound: "Pool Play 1", rules: { gameMax: 50, tourneyMax: 100 } };

        // ACCESS CONTROL LOGIC
        window.attemptAccess = function() {
            const codeInput = document.getElementById('access-code-input').value.toUpperCase();
            const CORRECT_CODE = "BASEBALL2026"; // ⬅️ CHANGE THIS SECRET CODE

            if (codeInput === CORRECT_CODE) {
                document.getElementById('lock-screen').classList.add('hidden');
                startApp();
            } else {
                alert("Incorrect Access Code.");
            }
        };

        function startApp() {
            onValue(ref(db, 'pitch_tracker/'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    appState = data;
                    updateUI();
                }
            });
        }

        // DATABASE PUSH
        function pushState() { set(ref(db, 'pitch_tracker/'), appState); }

        // BINDING GLOBAL ACTIONS
        window.changePitch = (val) => { 
            if(!appState.activePitcherId) return alert("Select Pitcher");
            appState.liveCount = Math.max(0, (appState.liveCount || 0) + val); 
            pushState(); 
        };
        window.handleManualInput = (val) => { appState.liveCount = parseInt(val) || 0; pushState(); };
        window.handlePitcherChange = (val) => { appState.activePitcherId = val; appState.liveCount = 0; pushState(); };
        window.handleRuleChange = () => {
            appState.rules.gameMax = parseInt(document.getElementById('game-max').value);
            appState.rules.tourneyMax = parseInt(document.getElementById('tourney-max').value);
            pushState();
        };
        window.addPlayer = () => {
            const name = prompt("Name:"); if(!name) return;
            appState.roster.push({ id: String(Date.now()), name, total: 0, stints: [] });
            pushState();
        };
        window.saveStint = () => {
            const p = appState.roster.find(x => x.id === appState.activePitcherId);
            if(!p) return;
            if(!p.stints) p.stints = [];
            p.stints.push({ round: appState.tournamentRound, count: appState.liveCount, time: new Date().toLocaleTimeString() });
            p.total += appState.liveCount;
            appState.liveCount = 0;
            pushState();
        };

        function updateUI() {
            const activeSelect = document.getElementById('active-pitcher');
            activeSelect.innerHTML = '<option value="">-- Select --</option>' + 
                appState.roster.map(p => `<option value="${p.id}" ${p.id === appState.activePitcherId ? 'selected' : ''}>${p.name}</option>`).join('');
            
            document.getElementById('live-count').value = appState.liveCount;
            document.getElementById('game-max').value = appState.rules.gameMax;
            document.getElementById('tourney-max').value = appState.rules.tourneyMax;

            const log = document.getElementById('master-log');
            log.innerHTML = appState.roster.map(p => `
                <div class="player-row">
                    <div class="player-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span>${p.name}</span>
                        <span class="badge ${p.total >= appState.rules.tourneyMax ? 'rag-red' : 'rag-green'}" style="padding:5px; color:white; border-radius:5px;">${p.total} Total</span>
                    </div>
                    <div class="stint-list">
                        ${p.stints ? p.stints.map(s => `<div>${s.round}: ${s.count}</div>`).join('') : 'No games'}
                    </div>
                </div>
            `).join('');
        }
    </script>
</head>
<body>

    <div id="lock-screen">
        <h2 style="margin-bottom: 20px;">Dugout Access Required</h2>
        <input type="password" id="access-code-input" placeholder="Enter Access Code" style="width: 250px; text-align: center;">
        <button onclick="attemptAccess()" style="width: 250px; background: var(--rag-green);">Unlock Tracker</button>
    </div>

    <header><h1>Shared Pitch Tracker</h1></header>

    <div class="layout">
        <div class="card">
            <div class="limit-config-header">
                <div class="config-grid">
                    <div class="config-item"><label>GAME MAX</label><input type="number" id="game-max" oninput="handleRuleChange()"></div>
                    <div class="config-item"><label>TOURNEY MAX</label><input type="number" id="tourney-max" oninput="handleRuleChange()"></div>
                </div>
            </div>
            <select id="active-pitcher" onchange="handlePitcherChange(this.value)"></select>
            <input type="number" class="counter-input" id="live-count" oninput="handleManualInput(this.value)">
            <div class="counter-buttons">
                <button onclick="changePitch(1)" style="background:var(--primary); color:white; padding: 20px;">+1 PITCH</button>
                <button onclick="changePitch(-1)" style="background:#64748b; color:white;">-1</button>
            </div>
            <button onclick="saveStint()" style="background:var(--rag-green); color:white; padding: 15px; margin-top: 10px;">COMMIT TO LOG</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>Tournament Log</h2>
                <button onclick="addPlayer()" style="width:auto; padding: 5px 15px;">+ Add Player</button>
            </div>
            <div id="master-log"></div>
        </div>
    </div>
</body>
</html>
