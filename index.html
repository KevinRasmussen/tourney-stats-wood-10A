<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Team Pitch Tracker LIVE</title>
    <style>
        :root {
            --primary: #0f172a; --bg: #f1f5f9; --card-bg: #ffffff;
            --text: #0f172a; --border: #cbd5e1;
            --rag-green: #16a34a; --rag-yellow: #ca8a04;
            --rag-orange: #ea580c; --rag-red: #dc2626;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 15px; max-width: 1100px; margin: 0 auto; }
        
        /* LOCK SCREEN */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary); color: white; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000;
        }

        header { background: var(--primary); color: white; padding: 15px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        .layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 900px) { .layout { grid-template-columns: 380px 1fr; } }
        
        .card { background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .limit-config-header { background: #e2e8f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        input, select, button { border-radius: 6px; border: 1px solid var(--border); font-size: 1rem; width: 100%; margin-bottom: 10px; padding: 12px; }
        
        .row-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }

        .counter-input { 
            width: 100%; background: transparent; border: 2px dashed transparent; text-align: center; 
            font-size: 5.5rem; font-weight: 900; margin-bottom: 0; line-height: 1; padding: 10px; outline: none;
        }
        
        .live-status-pills { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .status-pill { font-size: 0.8rem; font-weight: bold; padding: 6px 14px; border-radius: 20px; color: white; transition: 0.3s; }
        
        .counter-buttons { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        .counter-buttons button { padding: 25px; font-size: 1.5rem; color: white; background: var(--primary); }
        
        .player-row { border-bottom: 1px solid var(--border); padding: 12px 0; }
        .player-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; }
        .stint-list { margin-top: 10px; background: #f8fafc; border-radius: 8px; font-size: 0.85rem; display: none; border: 1px solid var(--border); padding: 5px; }
        .stint-list.open { display: block; }
        
        /* LOG GROUPING STYLING */
        .game-group-header { background: #e2e8f0; font-weight: bold; padding: 6px 10px; margin-top: 5px; border-radius: 4px; font-size: 0.8rem; display: flex; justify-content: space-between;}
        .stint-item { display: grid; grid-template-columns: 1fr 80px 100px; padding: 6px 10px; border-bottom: 1px solid #e2e8f0; }
        .stint-item:last-child { border-bottom: none; }

        .badge { padding: 4px 10px; border-radius: 6px; color: white; font-weight: bold; }
        .rag-green { background-color: var(--rag-green) !important; color: white !important; }
        .rag-yellow { background-color: var(--rag-yellow) !important; color: white !important; }
        .rag-orange { background-color: var(--rag-orange) !important; color: white !important; }
        .rag-red { background-color: var(--rag-red) !important; color: white !important; animation: pulse 1s infinite; }
        
        .text-green { color: var(--rag-green); }
        .text-yellow { color: var(--rag-yellow); }
        .text-orange { color: var(--rag-orange); }
        .text-red { color: var(--rag-red); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h2 style="margin-bottom: 20px;">Dugout Access Required</h2>
        <input type="password" id="access-code-input" placeholder="Enter Access Code" style="width: 280px; text-align: center; margin-bottom: 15px;">
        <button onclick="attemptAccess()" style="width: 280px; background: var(--rag-green); color: white; border: none;">Unlock Tracker</button>
    </div>

    <header><h1>Tourney Pitch Manager LIVE</h1></header>

    <div class="layout">
        <div class="card">
            <div class="limit-config-header">
                <div class="config-grid">
                    <div class="config-item">
                        <label style="font-size: 0.7rem; font-weight: bold;">GAME MAX</label>
                        <input type="number" id="game-max" value="50" oninput="handleRuleChange()">
                    </div>
                    <div class="config-item">
                        <label style="font-size: 0.7rem; font-weight: bold;">TOURNEY MAX</label>
                        <input type="number" id="tourney-max" value="100" oninput="handleRuleChange()">
                    </div>
                </div>
            </div>

            <h2>Live Control</h2>
            <select id="active-pitcher" onchange="handlePitcherChange(this.value)"></select>
            
            <!-- ENHANCED: Opponent input paired side-by-side with a dynamic Inning Select drop-down -->
            <div class="row-grid">
                <div>
                    <label style="font-size: 0.75rem; font-weight: bold; color: var(--primary); display: block; margin-bottom: 4px;">CURRENT OPPONENT</label>
                    <input type="text" id="opponent-team" placeholder="vs. Team Name" oninput="handleOpponentChange(this.value)">
                </div>
                <div>
                    <label style="font-size: 0.75rem; font-weight: bold; color: var(--primary); display: block; margin-bottom: 4px;">INNING</label>
                    <select id="current-inning" onchange="handleInningChange(this.value)">
                        <option>Inning 1</option><option>Inning 2</option><option>Inning 3</option>
                        <option>Inning 4</option><option>Inning 5</option><option>Inning 6</option>
                        <option>Inning 7</option><option>Inning 8</option>
                    </select>
                </div>
            </div>

            <div class="live-status-pills">
                <div id="game-pill" class="status-pill rag-green">Game: 0</div>
                <div id="tourney-pill" class="status-pill rag-green">Tourney: 0</div>
            </div>

            <input type="number" class="counter-input text-green" id="live-count" value="0" oninput="handleManualInput(this.value)">

            <div class="counter-buttons">
                <button onclick="changePitch(1)">+1 PITCH</button>
                <button onclick="changePitch(-1)" style="background:#64748b;">-1</button>
            </div>
            
            <button onclick="saveStint()" style="background:var(--primary); color:white; padding: 18px; margin-top: 15px; font-size: 1.1rem;">COMMIT STINT TO LOG</button>
        </div>

        <div class="card">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 20px;">
                <h2>Tournament Log</h2>
                <button style="width: auto; padding: 8px 15px; margin-bottom: 0;" onclick="addPlayer()">+ Add Player</button>
            </div>
            <div id="master-log"></div>
            <button style="background:#cbd5e1; color:#475569; font-size:0.7rem; width:auto; margin-top:20px; border:none;" onclick="resetAll()">Full Tournament Reset</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // 🟢 PASTE YOUR EXACT FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyCHoF69fKGGwbMKLBk10CQkT_26VwjOb2E",
            authDomain: "tournamentpitchtracker.firebaseapp.com",
            databaseURL: "https://tournamentpitchtracker-default-rtdb.firebaseio.com",
            projectId: "tournamentpitchtracker",
            storageBucket: "tournamentpitchtracker.firebasestorage.app",
            messagingSenderId: "811876287070",
            appId: "1:811876287070:web:610c53801c3a436e99eacf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let appState = {
            roster: [],
            liveCount: 0,
            activePitcherId: "",
            opponentTeam: "",
            currentInning: "Inning 1", // Tracks live inning selection
            rules: { gameMax: 50, tourneyMax: 100 }
        };

        // ACCESS CONTROL
        window.attemptAccess = function() {
            const input = document.getElementById('access-code-input').value.toUpperCase();
            const SECRET = "BASEBALL2026"; // ⬅️ YOUR CODE HERE
            if (input === SECRET) {
                document.getElementById('lock-screen').classList.add('hidden');
                initSync();
            } else {
                alert("Access Denied");
            }
        };

        function initSync() {
            onValue(ref(db, 'pitch_tracker/'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    appState = data;
                    updateUI();
                }
            });
        }

        function pushState() { set(ref(db, 'pitch_tracker/'), appState); }

        // UTILITY: GET RAG COLOR
        function getRagClass(current, max) {
            if (!max || max <= 0) return 'rag-green';
            const pct = current / max;
            if (pct >= 1.0) return 'rag-red';
            if (pct >= 0.75) return 'rag-orange';
            if (pct >= 0.50) return 'rag-yellow';
            return 'rag-green';
        }

        // ACTIONS
        window.changePitch = (val) => {
            if (!appState.activePitcherId) return alert("Select a pitcher");
            appState.liveCount = Math.max(0, (appState.liveCount || 0) + val);
            pushState();
        };

        window.handleManualInput = (val) => {
            appState.liveCount = Math.max(0, parseInt(val) || 0);
            pushState();
        };

        window.handlePitcherChange = (id) => {
            appState.activePitcherId = id;
            appState.liveCount = 0;
            pushState();
        };

        window.handleOpponentChange = (val) => {
            appState.opponentTeam = val;
            pushState();
        };

        window.handleInningChange = (val) => {
            appState.currentInning = val;
            pushState();
        };

        window.handleRuleChange = () => {
            appState.rules.gameMax = parseInt(document.getElementById('game-max').value) || 50;
            appState.rules.tourneyMax = parseInt(document.getElementById('tourney-max').value) || 100;
            pushState();
        };

        window.addPlayer = () => {
            const name = prompt("Player Name:"); if(!name) return;
            const num = prompt("Jersey #:");
            if(!appState.roster) appState.roster = [];
            appState.roster.push({ id: String(Date.now()), name, num: num || '00', total: 0, stints: [] });
            pushState();
        };

        window.saveStint = () => {
            const p = appState.roster.find(x => x.id === appState.activePitcherId);
            if (!p || appState.liveCount === 0) return alert("Select pitcher and ensure count > 0");
            
            const currentOpponent = appState.opponentTeam.trim() || "Unknown Opponent";
            
            if (!p.stints) p.stints = [];
            p.stints.push({ 
                opponent: currentOpponent,
                inning: appState.currentInning || "Inning 1",
                count: appState.liveCount, 
                time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) 
            });
            p.total += appState.liveCount;
            
            // Clear current count for the next selection
            appState.liveCount = 0;
            pushState();
        };

        window.resetAll = () => {
            if (confirm("Clear all game logs?")) {
                appState.roster.forEach(p => { p.total = 0; p.stints = []; });
                appState.liveCount = 0;
                appState.opponentTeam = "";
                appState.currentInning = "Inning 1";
                pushState();
            }
        };

        function updateUI() {
            const gMax = appState.rules.gameMax;
            const tMax = appState.rules.tourneyMax;

            // Sync Basic Inputs
            document.getElementById('game-max').value = gMax;
            document.getElementById('tourney-max').value = tMax;
            document.getElementById('live-count').value = appState.liveCount;
            document.getElementById('opponent-team').value = appState.opponentTeam || "";
            document.getElementById('current-inning').value = appState.currentInning || "Inning 1";

            // Dropdown
            const select = document.getElementById('active-pitcher');
            select.innerHTML = '<option value="">-- Select Pitcher --</option>' + 
                appState.roster.map(p => `<option value="${p.id}" ${p.id === appState.activePitcherId ? 'selected' : ''}>${p.name} (#${p.num})</option>`).join('');

            const activeP = appState.roster.find(x => x.id === appState.activePitcherId);
            const liveInput = document.getElementById('live-count');

            if (activeP) {
                // Calculate the true game-specific total by looking at logged stints for the *current* opponent
                const activeOpponent = appState.opponentTeam.trim() || "Unknown Opponent";
                const loggedGameTotal = (activeP.stints || [])
                    .filter(s => s.opponent === activeOpponent)
                    .reduce((sum, s) => sum + s.count, 0);

                const trueGameTotalPlusLive = loggedGameTotal + appState.liveCount;
                const tourneyTotalPlusLive = activeP.total + appState.liveCount;
                
                const gp = document.getElementById('game-pill');
                gp.innerText = `Game Total: ${trueGameTotalPlusLive} / ${gMax}`;
                gp.className = `status-pill ${getRagClass(trueGameTotalPlusLive, gMax)}`;

                const tp = document.getElementById('tourney-pill');
                tp.innerText = `Tourney: ${tourneyTotalPlusLive} / ${tMax}`;
                tp.className = `status-pill ${getRagClass(tourneyTotalPlusLive, tMax)}`;

                const gClass = getRagClass(trueGameTotalPlusLive, gMax).replace('rag-', 'text-');
                const tClass = getRagClass(tourneyTotalPlusLive, tMax).replace('rag-', 'text-');
                
                const severity = ['text-red', 'text-orange', 'text-yellow', 'text-green'];
                liveInput.className = `counter-input ${severity.find(c => c === gClass || c === tClass)}`;
            } else {
                liveInput.className = "counter-input text-green";
                document.getElementById('game-pill').className = "status-pill rag-green";
                document.getElementById('tourney-pill').className = "status-pill rag-green";
            }

            // Log Rendering with Advanced Inning/Game Grouping
            const log = document.getElementById('master-log');
            log.innerHTML = [...appState.roster].sort((a,b) => b.total - a.total).map(p => {
                // Step 1: Organize stints by unique opponent games
                const gamesMap = {};
                if (p.stints) {
                    p.stints.forEach(s => {
                        if (!gamesMap[s.opponent]) gamesMap[s.opponent] = { stints: [], gameTotal: 0 };
                        gamesMap[s.opponent].stints.push(s);
                        gamesMap[s.opponent].gameTotal += s.count;
                    });
                }

                // Step 2: Build the HTML content for these games
                let gamesHTML = '<div style="padding:10px; color:#94a3b8;">No data</div>';
                if (Object.keys(gamesMap).length > 0) {
                    gamesHTML = Object.keys(gamesMap).map(opponentName => {
                        const gameData = gamesMap[opponentName];
                        return `
                            <div class="game-group">
                                <div class="game-group-header">
                                    <span>vs. ${opponentName}</span>
                                    <span>Game Total: ${gameData.gameTotal}</span>
                                </div>
                                ${gameData.stints.map(s => `
                                    <div class="stint-item">
                                        <span>${s.inning || 'Inning N/A'}</span>
                                        <b>${s.count} pitches</b>
                                        <span>${s.time}</span>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }).join('');
                }

                return `
                    <div class="player-row">
                        <div class="player-header" onclick="this.nextElementSibling.classList.toggle('open')">
                            <span>${p.name} <small>#${p.num}</small></span>
                            <span>
                                <span class="badge ${getRagClass(p.total, tMax)}">${p.total} / ${tMax}</span>
                            </span>
                        </div>
                        <div class="stint-list">
                            ${gamesHTML}
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
